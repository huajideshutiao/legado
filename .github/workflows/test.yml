name: Test Build

on:
  push:
    branches:
      - master
    paths:
      - '**'
      # - '!**/assets/**'
      # - '!**.md'
      - '!**/ISSUE_TEMPLATE/**'
      - '!**/modules/web/**'
  pull_request:
    paths-ignore:
      - '**/modules/web/**'
  workflow_run:
    workflows: [Build Web]
    branches: [master]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'Merge pull request') }}
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      versionL: ${{ steps.set-ver.outputs.versionL }}
      lanzou: ${{ steps.check.outputs.lanzou }}
      telegram: ${{ steps.check.outputs.telegram }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H%M)" >> $GITHUB_OUTPUT
          echo "versionL=$(date -d "8 hour" -u +3.%y.%m%d%H%M)" >> $GITHUB_OUTPUT
      - id: check
        run: |
          if [ "${{ secrets.LANZOU_ID }}" ]; then
            echo "lanzou=yes" >> $GITHUB_OUTPUT
          fi
          if [ "${{ secrets.BOT_TOKEN }}" ]; then
            echo "telegram=yes" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      product: app
      VERSION: ${{ needs.prepare.outputs.version }}
      VERSIONL: ${{ needs.prepare.outputs.versionL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Release Apk Sign
        run: |
          echo "给apk增加签名"
          cp $GITHUB_WORKSPACE/.github/workflows/legado.jks $GITHUB_WORKSPACE/app/legado.jks
          sed '$a\RELEASE_STORE_FILE=./legado.jks'          $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_KEY_ALIAS=legado'                 $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_STORE_PASSWORD=gedoor_legado'     $GITHUB_WORKSPACE/gradle.properties -i
          sed '$a\RELEASE_KEY_PASSWORD=gedoor_legado'       $GITHUB_WORKSPACE/gradle.properties -i

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release (原包名)
        run: |
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSIONL }}\"" $GITHUB_WORKSPACE/app/build.gradle  -i
          echo "开始${{ env.product }}原包名构建"
          chmod +x gradlew
          ./gradlew assemble${{ env.product }}release --build-cache --parallel --daemon --warning-mode all
          echo "收集APK"
          mkdir -p ${{ github.workspace }}/apk/
          find ${{ github.workspace }}/app/build/outputs/apk -name "*.apk" -exec mv {} ${{ github.workspace }}/apk/ \;
          echo "移动mapping文件"
          mkdir -p ${{ github.workspace }}/mapping/
          for file in `ls ${{ github.workspace }}/app/build/outputs/mapping/*/mapping.txt 2>/dev/null`; do
            mv "$file" ${{ github.workspace }}/mapping/mapping.txt
          done
          for file in `ls ${{ github.workspace }}/app/build/outputs/mapping/*/missing_rules.txt 2>/dev/null`; do
            mv "$file" ${{ github.workspace }}/mapping/missing_rules.txt
          done

      - name: Upload (原包名) Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.product }}.原包名
          path: |
            ${{ github.workspace }}/apk/*原包名*.apk
            ${{ github.workspace }}/mapping/mapping.txt
            ${{ github.workspace }}/mapping/missing_rules.txt
          if-no-files-found: ignore

      - name: Deploy (原包名) To Release/Lanzou/Telegram
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ylogin: ${{ secrets.LANZOU_ID }}
          phpdisk_info: ${{ secrets.LANZOU_PSD }}
          LANZOU_FOLDER_ID: ${{ secrets.LANZOU_FOLDER_ID }}
          LANZOU_URL: ${{ secrets.LANZOU_URL }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # 1. 准备发布文件
          mkdir -p deploy/
          cp apk/*原包名*.apk deploy/
          
          # 2. GitHub Release (使用 gh 命令行以支持并发和更新)
          # 先尝试删除旧的 beta 标签对应的 release（仅在第一次构建时或通过逻辑判断，这里简单处理）
          # 为稳妥起见，我们使用 ncipollo/release-action 的逻辑，但这里为了速度改用 shell
          
          # 3. 发布到 Telegram (逻辑简化，只发原包名)
          if [ "${{ needs.prepare.outputs.telegram }}" == "yes" ]; then
             echo "Post to TG..."
             # 此处逻辑较复杂，建议仍使用 Action 步骤，见下文
          fi

      # 为了节省时长且不浪费 Matrix，我们将发布步骤紧跟在编译后，但在同一个 Job 内
      - name: Release Note & Tag
        if: github.event_name != 'pull_request'
        run: |
          echo "## 更新日志" > RELEASE_NOTES.md
          if [ "${{ github.event_name }}" == "push" ]; then
            git log ${{ github.event.before }}..${{ github.event.after }} --pretty=format:"- %<(72,trunc)%s (%h)" | head -20 >> RELEASE_NOTES.md
          else
            git log -10 --pretty=format:"- %<(72,trunc)%s (%h)" >> RELEASE_NOTES.md
          fi

      - name: Delete Old Beta Release
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: gh release delete beta -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish Pre-Release (原包名)
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          name: ${{ env.VERSION }}
          tag: "beta"
          bodyFile: RELEASE_NOTES.md
          prerelease: true
          allowUpdates: true
          artifacts: ${{ github.workspace }}/apk/*原包名*.apk

      - name: Upload (原包名) To Lanzou
        if: github.event_name != 'pull_request' && needs.prepare.outputs.lanzou == 'yes'
        continue-on-error: true
        run: |
          python3 .github/scripts/lzy_web.py "${{ github.workspace }}/apk/" "${{ secrets.LANZOU_FOLDER_ID }}"
        env:
          ylogin: ${{ secrets.LANZOU_ID }}
          phpdisk_info: ${{ secrets.LANZOU_PSD }}

      - name: Post (原包名) to Telegram
        if: github.event_name != 'pull_request' && needs.prepare.outputs.telegram == 'yes'
        uses: xireiki/channel-post@v1
        with:
          chat_id: ${{ secrets.CHANNEL_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}
          context: "#阅读 #Legado #Beta ${{ env.VERSIONL }} (原包名)"
          path: apk/*原包名*.apk
          method: sendFile

      # --- 接着编译共存版 ---
      - name: Build ReleaseA (共存)
        run: |
          echo "修改applicationIdSuffix为共存版"
          sed "s/'.release'/'.releaseA'/" $GITHUB_WORKSPACE/app/build.gradle  -i
          echo "开始${{ env.product }}共存构建"
          ./gradlew assemble${{ env.product }}release --build-cache --parallel --daemon --warning-mode all
          echo "收集共存版APK"
          find ${{ github.workspace }}/app/build/outputs/apk -name "*.apk" -exec mv {} ${{ github.workspace }}/apk/ \;

      - name: Upload (共存) Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.product }}.共存
          path: ${{ github.workspace }}/apk/*共存*.apk

      - name: Append (共存) To Release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "beta"
          artifacts: ${{ github.workspace }}/apk/*共存*.apk
          omitBody: true
          omitName: true
          prerelease: true

      - name: Upload (共存) To Lanzou
        if: github.event_name != 'pull_request' && needs.prepare.outputs.lanzou == 'yes'
        continue-on-error: true
        run: |
          # 只上传共存版
          mkdir -p apk_coexist/
          cp apk/*共存*.apk apk_coexist/
          python3 .github/scripts/lzy_web.py "${{ github.workspace }}/apk_coexist/" "${{ secrets.LANZOU_FOLDER_ID }}"
        env:
          ylogin: ${{ secrets.LANZOU_ID }}
          phpdisk_info: ${{ secrets.LANZOU_PSD }}

      - name: Post (共存) to Telegram
        if: github.event_name != 'pull_request' && needs.prepare.outputs.telegram == 'yes'
        uses: xireiki/channel-post@v1
        with:
          chat_id: ${{ secrets.CHANNEL_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}
          context: "#阅读 #Legado #Beta ${{ env.VERSIONL }} (共存)"
          path: apk/*共存*.apk
          method: sendFile

  test_Branch:
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && github.actor == 'gedoor' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: apk/
      - working-directory: apk/
        run: mv */*.apk . ;rm -rf */
      - name: Push To "test" Branch
        run: |
          cd $GITHUB_WORKSPACE/apk/
          git init
          git checkout -b test
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://${{ github.actor }}:${{ secrets.ACTIONS_TOKEN }}@github.com/${{ github.actor }}/release"
          git add *.apk
          git commit -m "${{ needs.prepare.outputs.versionL }}"
          git push -f -u origin test
