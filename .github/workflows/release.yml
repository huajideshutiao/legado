name: Release Build

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      sign: ${{ steps.check.outputs.sign }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT
      - id: check
        run: |
          if [ ! -z "${{ secrets.RELEASE_KEY_STORE }}" ]; then
            echo "sign=yes" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.sign }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Release Apk Sign
        env:
          RS_FILE: ${{ secrets.RELEASE_KEY_STORE }}
          RS_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RS_KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RS_STORE_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS="$RS_ALIAS" >> gradle.properties
          echo RELEASE_KEY_PASSWORD="$RS_KEY_PASS" >> gradle.properties
          echo RELEASE_STORE_PASSWORD="$RS_STORE_PASS" >> gradle.properties
          echo RELEASE_STORE_FILE='./key.jks' >> gradle.properties
          echo "$RS_FILE" | python3 -c "import sys,base64; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()))" > $GITHUB_WORKSPACE/app/key.jks

      - name: Unify Version Name
        run: |
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" $GITHUB_WORKSPACE/app/build.gradle  -i

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build With Gradle
        run: |
          echo "开始进行app构建"
          chmod +x gradlew
          ./gradlew assembleapprelease --build-cache --parallel --daemon --warning-mode all

      - name: Generate Release Notes
        run: |
          echo "## 更新日志" > ${{ github.workspace }}/RELEASE_NOTES.md
          echo "" >> ${{ github.workspace }}/RELEASE_NOTES.md
          if [ "${{ github.event_name }}" == "push" ]; then
            git log ${{ github.event.before }}..${{ github.event.after }} --pretty=format:"- %s (%h)" >> ${{ github.workspace }}/RELEASE_NOTES.md
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            git log --since="1 week ago" --pretty=format:"- %s (%h)" >> ${{ github.workspace }}/RELEASE_NOTES.md
          else
            git log -1 --pretty=format:"- %s (%h)" >> ${{ github.workspace }}/RELEASE_NOTES.md
          fi
          
          # 兜底：如果日志内容为空（除了标题），补充默认说明
          if [ $(cat ${{ github.workspace }}/RELEASE_NOTES.md | wc -l) -le 2 ]; then
            echo "- 定期维护编译，无代码变更。" >> ${{ github.workspace }}/RELEASE_NOTES.md
          fi
          cat ${{ github.workspace }}/RELEASE_NOTES.md

      - name: Organize the Files
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          cp -rf ${{ github.workspace }}/app/build/outputs/apk/*/*/*.apk ${{ github.workspace }}/apk/
          
      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado_app
          path: ${{ github.workspace }}/apk/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: legado_app_${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body_path: ${{ github.workspace }}/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ${{ github.workspace }}/apk/legado_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Assets To "release" Branch
        if: ${{ github.actor == 'huajideshutiao' }}
        run: |
          cd $GITHUB_WORKSPACE/apk/
          git init
          git checkout -b release
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://${{ github.actor }}:${{ secrets.ACTIONS_TOKEN }}@github.com/${{ github.actor }}/release"
          git add *.apk
          git commit -m "${{ env.VERSION }}"
          git push -f -u origin release
          
      - name: Purge Jsdelivr Cache
        if: ${{ github.actor == 'huajideshutiao' }}
        run: |
          result=$(curl -s https://purge.jsdelivr.net/gh/${{ github.actor }}/release@release/)
          if echo $result |grep -q 'success.*true'; then
            echo "jsdelivr缓存更新成功"
          else
            echo $result
          fi
