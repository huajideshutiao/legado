name: Release Build

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    outputs:
      version: ${{ steps.set-ver.outputs.version }}
      sign: ${{ steps.check.outputs.sign }}
    steps:
      - id: set-ver
        run: |
          echo "version=$(date -d "8 hour" -u +3.%y.%m%d%H)" >> $GITHUB_OUTPUT
      - id: check
        run: |
          if [ ! -z "${{ secrets.RELEASE_KEY_STORE }}" ]; then
            echo "sign=yes" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.sign }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Release Apk Sign
        env:
          RS_FILE: ${{ secrets.RELEASE_KEY_STORE }}
          RS_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RS_KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RS_STORE_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
        run: |
          echo -e "\n" >> gradle.properties
          echo RELEASE_KEY_ALIAS="$RS_ALIAS" >> gradle.properties
          echo RELEASE_KEY_PASSWORD="$RS_KEY_PASS" >> gradle.properties
          echo RELEASE_STORE_PASSWORD="$RS_STORE_PASS" >> gradle.properties
          echo RELEASE_STORE_FILE='./key.jks' >> gradle.properties
          echo "$RS_FILE" | python3 -c "import sys,base64; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()))" > $GITHUB_WORKSPACE/app/key.jks

      - name: Unify Version Name
        run: |
          echo "统一版本号"
          sed "/def version/c def version = \"${{ env.VERSION }}\"" $GITHUB_WORKSPACE/app/build.gradle  -i

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release (原包名)
        run: |
          echo "开始app原包名构建"
          chmod +x gradlew
          ./gradlew assembleapprelease --build-cache --parallel --daemon --warning-mode all
          mkdir -p ${{ github.workspace }}/apk/
          find ${{ github.workspace }}/app/build/outputs/apk -name "*.apk" -exec mv {} ${{ github.workspace }}/apk/ \;

      - name: Build ReleaseA (共存)
        continue-on-error: true
        run: |
          echo "修改applicationIdSuffix为共存版"
          sed "s/'.release'/'.releaseA'/" $GITHUB_WORKSPACE/app/build.gradle -i
          echo "开始app共存构建"
          ./gradlew assembleapprelease --build-cache --parallel --daemon --warning-mode all
          find ${{ github.workspace }}/app/build/outputs/apk -name "*.apk" -exec mv {} ${{ github.workspace }}/apk/ \;

      - name: Generate Release Notes
        run: |
          echo "## 更新日志" > ${{ github.workspace }}/RELEASE_NOTES.md
          echo "" >> ${{ github.workspace }}/RELEASE_NOTES.md
          COMMITS=$(git log --since="15 days ago" --pretty=format:"- %<(72,trunc)%s (%h)")
          OLDEST=$(git log --since="15 days ago" --format="%H" | tail -1)
          BASE=$(git rev-parse "${OLDEST}^" 2>/dev/null || echo "$OLDEST")
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${BASE}...HEAD"

          if [ -n "$COMMITS" ]; then
            echo "$COMMITS" | head -25 >> ${{ github.workspace }}/RELEASE_NOTES.md
            TOTAL=$(echo "$COMMITS" | wc -l)
            if [ "$TOTAL" -gt 25 ]; then
              echo "- *……还有 $((TOTAL - 25)) 条提交未显示*" >> ${{ github.workspace }}/RELEASE_NOTES.md
            fi
            echo "" >> ${{ github.workspace }}/RELEASE_NOTES.md
            echo "[查看完整提交记录 →](${COMPARE_URL})" >> ${{ github.workspace }}/RELEASE_NOTES.md
          else
            echo "- 定期维护编译，无代码变更。" >> ${{ github.workspace }}/RELEASE_NOTES.md
          fi
          cat ${{ github.workspace }}/RELEASE_NOTES.md

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ github.workspace }}/apk/*.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body_path: ${{ github.workspace }}/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ${{ github.workspace }}/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
