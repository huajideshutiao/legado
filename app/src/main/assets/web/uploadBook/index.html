<body>
<div class="title-wrap">
    <div class="s-title">
        <span class="app-name">阅读</span>
        <span class="sep">|</span>
        <span class="page-name">WiFi传输</span>
        </div>
    </div>
<div class="main-wrap">
    <div class="top-cont">
        <div>
            <p class="status">可支持文件格式：</p>
                <p class="type">TXT、EPUB、UMD、PDF、MOBI、AZW3、AZW</p>
            </div>
        <form class="select-btn">
            选择文件
            <input id="fileInput" multiple type="file">
        </form>
    </div>
    <div class="s-table" id="drag">
        <table>
            <thead>
            <tr>
                <td></td>
                <td>文件名</td>
                <td>大小</td>
                <td>操作</td>
            </tr>
            </thead>
            <tbody id="fileList">
            <tr>
                <td class="last-row" colspan="4">请将图书或字体拖拽至此即可上传</td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>

<script>
    const FILE_TYPES = /(\.|\/)(txt|epub|umd|pdf|mobi|azw3|azw)$/i;
    const UPLOAD_URL = '../addLocalBook';
    const fileMap = {};
    const uploadQueue = [];
    let isUploading = false;
    let fileCounter = 0;

    const fileList = document.getElementById('fileList');
    const dragArea = document.getElementById('drag');
    const fileInput = document.getElementById('fileInput');

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + 'B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + 'KB';
        return (bytes / (1024 * 1024)).toFixed(2) + 'MB';
    }

    function truncateName(name) {
        if (name.length < 30) return name;
        const dot = name.lastIndexOf('.');
        const suffix = name.slice(dot);
        const pre = name.slice(0, dot);
        return pre.slice(0, 20) + '....' + pre.slice(-4) + suffix;
    }

    function addFileRow(file) {
        const idx = ++fileCounter;
        const tr = document.createElement('tr');
        tr.innerHTML =
            '<td><span>' + idx + '</span></td>' +
            '<td><span>' + truncateName(file.name) + '</span></td>' +
            '<td><span>' + formatSize(file.size) + '</span></td>' +
            '<td><span><i class="progress">0%</i></span></td>';
        const lastRow = fileList.querySelector('.last-row');
        if (lastRow) {
            fileList.insertBefore(tr, lastRow);
        } else {
            fileList.appendChild(tr);
        }
        fileMap[file.name] = tr.querySelector('i');
    }

    function checkFile(file) {
        if (!FILE_TYPES.test(file.name)) return '格式不支持';
        if (fileMap[file.name]) return '文件已存在';
        return null;
    }

    function uploadFile(file) {
        isUploading = true;
        const fd = new FormData();
        fd.append('fileName', file.name);
        fd.append('fileData', file);

        const xhr = new XMLHttpRequest();
        const indicator = fileMap[file.name];

        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                indicator.textContent = Math.round(e.loaded / e.total * 100) + '%';
            }
        });

        xhr.addEventListener('load', () => {
            if (xhr.status === 200) {
                indicator.className = 'success';
                indicator.textContent = '';
            } else {
                indicator.className = 'fail';
                indicator.textContent = '';
            }
            nextUpload();
        });

        xhr.addEventListener('error', () => {
            indicator.className = 'fail';
            indicator.textContent = '';
            nextUpload();
        });

        xhr.open('POST', UPLOAD_URL);
        xhr.send(fd);
    }

    function nextUpload() {
        isUploading = false;
        if (uploadQueue.length > 0) {
            uploadFile(uploadQueue.shift());
        }
    }

    function handleFiles(files) {
        const errors = [];
        for (const file of files) {
            const msg = checkFile(file);
            if (msg) {
                errors.push(msg);
            } else {
                addFileRow(file);
                uploadQueue.push(file);
            }
        }
        if (errors.length > 0) {
            if (files.length === 1) {
                alert(errors[0]);
            } else {
                alert('你选择了' + files.length + '个文件，只能上传' + (files.length - errors.length) + '个文件。\n请选择可支持文件格式且文件名不能重复。');
            }
        }
        if (!isUploading && uploadQueue.length > 0) {
            uploadFile(uploadQueue.shift());
        }
    }

    fileInput.addEventListener('change', function () {
        if (this.files.length > 0) {
            handleFiles(this.files);
        }
        this.value = '';
    });

    dragArea.addEventListener('dragover', e => {
        e.preventDefault();
        dragArea.classList.add('active');
    });

    dragArea.addEventListener('dragleave', e => {
        e.preventDefault();
        dragArea.classList.remove('active');
    });

    dragArea.addEventListener('drop', e => {
        e.preventDefault();
        dragArea.classList.remove('active');
        if (e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });
</script>
</body>
